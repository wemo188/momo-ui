
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Starlet</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@400;700&family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" rel="stylesheet">

<style>
.mmg-fallback{
  width:100%;height:100%;
  position:relative;
  border-radius:16px;
  background:#fff;
  border:1px solid rgba(220,235,255,.55);
  box-shadow:0 14px 30px rgba(20,35,55,.14);
  overflow:hidden;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}
.mmg-fallback:before{
  content:"";
  position:absolute;inset:-45%;
  background:
    radial-gradient(closest-side at 52% 48%,rgba(79,121,166,.56),transparent 62%),
    radial-gradient(closest-side at 50% 55%,rgba(126,163,201,.36),transparent 64%),
    radial-gradient(closest-side at 60% 40%,rgba(223,231,243,.18),transparent 66%);
  filter:blur(14px);
  transform:rotate(-10deg);
  pointer-events:none;
}
.mmg-fallback:after{
  content:"";
  position:absolute;inset:0;
  background:
    linear-gradient(135deg,rgba(255,255,255,.42),transparent 42%),
    linear-gradient(315deg,rgba(255,255,255,.20),transparent 44%);
  pointer-events:none;
  mix-blend-mode:screen;
  opacity:.82;
}
</style>

<script>
(function(){
  var v = Date.now();
  var css = [
    'base.css','panels.css','character.css','worldbook.css',
    'chat.css','preset.css','calendar.css','dock.css',
    'cards.css','frost.css','workshop.css','user.css',
    'wechat.css','char-mgr.css','api.css'
  ];
  css.forEach(function(href){
    var link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = href + '?v=' + v;
    document.head.appendChild(link);
  });
})();
</script>
</head>
<body>
  
<script>
function imgFallback(img){
  img.onerror = null;
  var d = document.createElement('div');
  d.className = 'mmg-fallback';
  var w = img.getAttribute('width') || (img.parentElement ? img.parentElement.offsetWidth : 0) || 80;
  var h = img.getAttribute('height') || (img.parentElement ? img.parentElement.offsetHeight : 0) || 80;
  d.style.width = w + 'px';
  d.style.height = h + 'px';
  img.replaceWith(d);
}
</script>

                </div></div>
                <div class="search-wrapper"><div class="search-box-right">

                  <div class="avatar-area-right" data-side="search2"><div class="avatar-preview" id="avatarPreview2"><svg viewBox="0 0 24 24" fill="none" stroke="#adcdea" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"></circle><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"></path></svg></div></div>
                </div></div>
              </div>
            </div>
            <div class="card-right-area">
              <div class="card-icons-wrap">
                <div class="card-icon-item" id="cardIcon1">

                    <img src="https://iili.io/BQdQf1a.md.jpg" style="transform:scale(0.95);" onerror="imgFallback(this)">
                  </div>

                </div>
                <div class="card-icon-item" id="cardIcon2">
                  <div class="card-icon-img">

                  </div>
                  <div class="card-icon-label">论坛</div>
                </div>
              </div>
              <div class="bx-w" id="bx-1" data-side="right">
                <div class="bx-cw"><div class="bx-cd">
                  <div class="bx-side-ribbon">
                    <div class="bx-ribbon-tab r1 bx-ribbon-placeholder">标签</div>
                    <div class="bx-ribbon-tab r2 bx-ribbon-placeholder">标签</div>
                  </div>
                  <div class="bx-av-box"><div class="bx-av-front"><div class="bx-av-placeholder"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><span>点击设置</span></div></div></div>
                  <div class="bx-name-bar">
                    <div class="bx-name bx-name-placeholder">角色名</div>
                    <div class="bx-sub">◈与你共赏一阙火树银花◈</div>
                  </div>
                </div></div>
              </div>
            </div>
          </div>

          <!-- Eden文字卡片 -->
          <div class="eden-card" id="edenCard">
            <div class="eden-text" id="edenText" style="font-size:38px;">全世界 最好的你˶ᵒ ᵕ ˂˶️ಣ</div>
          </div>
        </div>
      </div>
    </section>

    <!-- 第二页 -->
    <section class="screen-page screen-page-2">
      <div class="screen-page-inner" style="position:relative;height:100%;">
        <div class="app-grid" id="appGrid">

<!-- 字体设置 -->
<div id="fontPanel" class="panel hidden">

    <h2>字体设置</h2>
    <button class="panel-close" data-close="fontPanel" aria-label="关闭" type="button">

    </button>
  </div>
  <div class="panel-body">
    <div id="fontList" class="font-list"></div>
    <div class="divider"></div>
    <div class="upload-area" id="fontUploadArea">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>

      <input type="file" id="fontFileInput" accept=".ttf,.otf,.woff,.woff2" hidden>
    </div>

  </div>
</div>

<!-- 背景图片 -->
<div id="bgPanel" class="panel hidden">
  <div class="panel-header">
    <h2>背景图片</h2>
    <button class="panel-close" data-close="bgPanel" aria-label="关闭" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>
  <div class="panel-body">
    <div class="upload-area" id="bgUploadArea">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="9" cy="9" r="1.5"/>
        <path d="M21 15l-5-5L5 21"/>
      </svg>
      <p>上传背景图片</p>
      <input type="file" id="bgFileInput" accept="image/*" hidden>
    </div>
    <div id="bgPreview" class="bg-preview hidden">
      <img id="bgPreviewImg" src="" alt="preview">
    </div>
    <div class="form-group">
      <label>模糊度</label>
      <input type="range" id="bgBlur" min="0" max="20" value="0">
      <span id="bgBlurVal">0px</span>
    </div>
    <div class="form-group">
      <label>暗度</label>
      <input type="range" id="bgDark" min="0" max="80" value="30">
      <span id="bgDarkVal">30%</span>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="applyBgBtn" type="button">应用背景</button>
      <button class="btn btn-outline" id="removeBgBtn" type="button">移除背景</button>
    </div>
  </div>
</div>

<!-- ====== Toast ====== -->
<div id="toast" class="toast hidden"></div>

<!-- ====== JS ====== -->
<script>
(function(){
  var v = Date.now();
  var files = [
    'script.js','theme.js','font.js','api.js','bg.js',
    'character.js','char-edit.js','user.js','worldbook.js','preset.js',
    'chat.js','chatui.js','calendar.js','cards.js','frost.js','char-mgr.js',
    'workshop.js','wechat.js','dock.js'
  ];
  var idx = 0;
  function loadNext(){
    if(idx >= files.length){
      if(document.readyState === 'complete' || document.readyState === 'interactive'){
        App.LS.onReady(function(){ App.init(); });
      } else {
        window.addEventListener('DOMContentLoaded', function(){
          App.LS.onReady(function(){ App.init(); });
        });
      }
      return;
    }
    var s = document.createElement('script');
    s.src = files[idx] + '?v=' + v;
    s.onload = function(){ idx++; loadNext(); };
    s.onerror = function(){ console.warn('加载失败: ' + files[idx]); idx++; loadNext(); };
    document.body.appendChild(s);
  }
  loadNext();
})();
</script>
</body>
</html>
