<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI 网页生成控制台</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: #f4f4f5; color: #333; height: 100vh; display: flex; flex-direction: column; }
    
    /* 顶部设置区 */
    header { background: #fff; padding: 10px 15px; display: flex; gap: 10px; flex-wrap: wrap; border-bottom: 1px solid #ddd; align-items: center; }
    .input-group { display: flex; align-items: center; gap: 5px; font-size: 13px; }
    .input-group input { padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
    button { padding: 5px 12px; border: none; border-radius: 4px; background: #3b82f6; color: white; cursor: pointer; font-size: 13px; }
    button:disabled { background: #9ca3af; }
    
    /* 主体：左聊天，右预览 */
    main { display: flex; flex: 1; overflow: hidden; }
    
    /* 左侧聊天区 */
    .chat-container { width: 400px; display: flex; flex-direction: column; background: #fff; border-right: 1px solid #ddd; }
    .messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
    .msg { padding: 10px; border-radius: 8px; font-size: 14px; line-height: 1.5; word-break: break-all; white-space: pre-wrap; }
    .msg.user { background: #dbeafe; align-self: flex-end; max-width: 90%; }
    .msg.ai { background: #f3f4f6; align-self: flex-start; max-width: 90%; }
    .msg.sys { background: #fee2e2; color: #991b1b; align-self: center; width: 100%; font-family: monospace; }
    
    .input-box { padding: 10px; border-top: 1px solid #ddd; display: flex; gap: 10px; }
    .input-box textarea { flex: 1; height: 60px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; resize: none; font-family: inherit; }
    
    /* 右侧预览区 */
    .preview-container { flex: 1; display: flex; flex-direction: column; background: #fff; }
    .preview-header { padding: 8px 15px; background: #f8fafc; border-bottom: 1px solid #ddd; font-size: 13px; display: flex; justify-content: space-between; color: #666; }
    iframe { flex: 1; width: 100%; border: none; background: #fff; }
    
    @media (max-width: 768px) {
      main { flex-direction: column; }
      .chat-container { width: 100%; height: 50%; border-right: none; border-bottom: 1px solid #ddd; }
    }
  </style>
</head>
<body>

  <header>
    <div class="input-group">
      <label>接口URL</label>
      <input id="apiUrl" placeholder="如 https://api.xxx.com" style="width: 150px;" />
    </div>
    <div class="input-group">
      <label>模型</label>
      <input id="apiModel" placeholder="输入模型名称" style="width: 120px;" />
    </div>
    <div class="input-group">
      <label>API Key</label>
      <input id="apiKey" type="password" placeholder="sk-..." style="width: 100px;" />
    </div>
    <div class="input-group">
      <label>GH Token</label>
      <input id="ghToken" type="password" placeholder="pat_..." style="width: 100px;" />
    </div>
    <div class="input-group">
      <label>仓库(拥有者/库名)</label>
      <input id="ghRepo" placeholder="wemo188/momo-ui" style="width: 130px;" />
    </div>
  </header>

  <main>
    <div class="chat-container">
      <div class="messages" id="chatBox">
        <div class="msg ai">系统提示：这是纯净版直连工具。输入需求后，AI 生成的代码将直接渲染在右侧，并自动同步至 GitHub 的 app.html。</div>
      </div>
      <div class="input-box">
        <textarea id="chatInput" placeholder="直接输入你对网页的需求..."></textarea>
        <button id="btnSend">发送<br>并更新</button>
      </div>
    </div>

    <div class="preview-container">
      <div class="preview-header">
        <span>实时网页预览 (app.html)</span>
        <span id="syncStatus">未同步</span>
      </div>
      <iframe id="previewFrame"></iframe>
    </div>
  </main>

  <script>
    const els = {
      apiUrl: document.getElementById('apiUrl'),
      apiModel: document.getElementById('apiModel'),
      apiKey: document.getElementById('apiKey'),
      ghToken: document.getElementById('ghToken'),
      ghRepo: document.getElementById('ghRepo'),
      chatBox: document.getElementById('chatBox'),
      chatInput: document.getElementById('chatInput'),
      btnSend: document.getElementById('btnSend'),
      previewFrame: document.getElementById('previewFrame'),
      syncStatus: document.getElementById('syncStatus')
    };

    // 1. 本地缓存读取与保存
    ['apiUrl', 'apiModel', 'apiKey', 'ghToken', 'ghRepo'].forEach(id => {
      const saved = localStorage.getItem('pure_' + id);
      if(saved) els[id].value = saved;
      els[id].addEventListener('input', e => localStorage.setItem('pure_' + id, e.target.value));
    });

    let currentHtmlCode = localStorage.getItem('pure_html_code') || '';
    if(currentHtmlCode) els.previewFrame.srcdoc = currentHtmlCode;

    function addMsg(role, text) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      els.chatBox.appendChild(div);
      els.chatBox.scrollTop = els.chatBox.scrollHeight;
    }

    // 2. 调用 AI 接口（完全无限制，纯粹执行命令）
    async function callAI(userText) {
      let rawUrl = els.apiUrl.value.trim().replace(/\/+$/, '');
      const key = els.apiKey.value.trim();
      const model = els.apiModel.value.trim();

      if (!rawUrl || !key || !model) throw new Error("请确保顶部 接口、模型、API Key 已填写完整。");

      // 自动补全 /chat/completions 路径
      let chatUrl = rawUrl;
      if (!chatUrl.endsWith('/chat/completions')) {
        chatUrl = chatUrl.endsWith('/v1') ? chatUrl + '/chat/completions' : chatUrl + '/v1/chat/completions';
      }

      // 纯粹的系统提示词：不带任何性格，不限制任何风格，只要完整代码
      const systemPrompt = `你是一个强大的 AI 编程助手。
你的任务是根据用户的需求，编写或修改一个完整的单文件 HTML 网页。
请严格将完整的 HTML 代码（包含 <html> 到 </html>）放在 \`\`\`html 和 \`\`\` 之间。
不要输出任何解释，不要输出任何废话，只输出代码块。`;

      const res = await fetch(chatUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${key}` },
        body: JSON.stringify({
          model: model,
          messages: [
            { role: "system", content: systemPrompt },
            { role: "user", content: `当前网页源码：\n${currentHtmlCode}\n\n用户修改需求：\n${userText}` }
          ],
          temperature: 0.3
        })
      });

      if (!res.ok) {
        const errText = await res.text();
        throw new Error(`API 请求失败 (状态码 ${res.status}): ${errText}`);
      }

      const data = await res.json();
      return data.choices[0].message.content;
    }

    // 3. 自动同步到 GitHub (app.html)
    async function syncToGitHub(htmlContent) {
      const token = els.ghToken.value.trim();
      const repo = els.ghRepo.value.trim();
      if (!token || !repo) {
        els.syncStatus.textContent = "缺少 GH Token 或仓库名，未保存到线上";
        els.syncStatus.style.color = "red";
        return;
      }

      els.syncStatus.textContent = "正在同步到 GitHub...";
      els.syncStatus.style.color = "#3b82f6";

      try {
        const apiUrl = `https://api.github.com/repos/${repo}/contents/app.html`;
        let sha = '';
        try {
          const resGet = await fetch(apiUrl, { headers: { "Authorization": `Bearer ${token}`, "Accept": "application/vnd.github+json" } });
          if(resGet.ok) { const fileInfo = await resGet.json(); sha = fileInfo.sha; }
        } catch(e) {}

        const resPut = await fetch(apiUrl, {
          method: 'PUT',
          headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
          body: JSON.stringify({
            message: "AI 自动更新了网页代码",
            content: btoa(unescape(encodeURIComponent(htmlContent))),
            sha: sha || undefined
          })
        });

        if (!resPut.ok) throw new Error("GitHub 写入失败");
        els.syncStatus.textContent = "已同步至线上 app.html";
        els.syncStatus.style.color = "green";
      } catch (e) {
        els.syncStatus.textContent = "同步失败: " + e.message;
        els.syncStatus.style.color = "red";
      }
    }

    // 4. 发送流程
    els.btnSend.onclick = async () => {
      const text = els.chatInput.value.trim();
      if (!text) return;

      addMsg('user', text);
      els.chatInput.value = '';
      els.btnSend.disabled = true;
      els.btnSend.textContent = '处理中...';

      try {
        const reply = await callAI(text);
        
        // 提取代码块
        const match = /```html\s*([\s\S]*?)```/.exec(reply);
        if (match) {
          currentHtmlCode = match[1].trim();
          localStorage.setItem('pure_html_code', currentHtmlCode);
          els.previewFrame.srcdoc = currentHtmlCode;
          
          addMsg('ai', "代码已生成并更新预览。");
          
          // 自动触发 GitHub 同步
          await syncToGitHub(currentHtmlCode);
        } else {
          // 如果 AI 没有返回代码块（比如报错或者单纯回答问题），直接显示原文
          addMsg('ai', reply);
        }
      } catch (e) {
        addMsg('sys', e.message);
      } finally {
        els.btnSend.disabled = false;
        els.btnSend.innerHTML = '发送<br>并更新';
      }
    };
  </script>
</body>
</html>
