<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>墨墨 · Chat + Code 后台</title>
  <style>
    :root{
      --accent:#adcdea;     /* 主色：蓝 */
      --white:#ffffff;      /* 白 */
      --ink:#0f172a;
      --muted:#475569;
      --line:rgba(15,23,42,.12);
      --shadow: 0 14px 40px rgba(15,23,42,.10);
      --radius: 16px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC","Hiragino Sans GB","Microsoft YaHei", Arial, "Noto Sans CJK SC", sans-serif;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:var(--sans);
      color:var(--ink);
      background:
        radial-gradient(1200px 900px at 10% 10%, rgba(173,205,234,.85), transparent 60%),
        radial-gradient(900px 700px at 90% 20%, rgba(173,205,234,.35), transparent 55%),
        linear-gradient(180deg, #ffffff, rgba(173,205,234,.18));
    }
    .app{height:100%; display:flex; flex-direction:column; gap:12px; padding:14px; max-width:1200px; margin:0 auto;}
    header{
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      padding:12px 14px;
      border:1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }
    .brand{display:flex; align-items:center; gap:10px; min-width:240px;}
    .dot{
      width:14px; height:14px; border-radius:50%;
      background: var(--accent);
      box-shadow: 0 10px 20px rgba(15,23,42,.10);
    }
    .brand h1{font-size:14px; margin:0; letter-spacing:.2px}
    .brand small{display:block; color:var(--muted); margin-top:2px}
    .top-actions{display:flex; gap:10px; align-items:center; justify-content:flex-end; flex-wrap:wrap;}
    .pill{
      display:flex; align-items:center; gap:8px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.9);
    }
    .pill label{font-size:12px; color:var(--muted)}
    .pill input{
      width:240px; border:none; outline:none; background:transparent;
      font-size:12px; color:var(--ink);
    }
    .btn{
      border:1px solid var(--line);
      background: rgba(255,255,255,.92);
      padding:10px 12px;
      border-radius: 12px;
      cursor:pointer;
      color:var(--ink);
      transition: transform .04s ease, background .15s ease;
      user-select:none;
      font-size:13px;
      white-space:nowrap;
    }
    .btn:hover{background: rgba(255,255,255,1)}
    .btn:active{transform: translateY(1px)}
    .btn.primary{
      background: linear-gradient(135deg, rgba(173,205,234,.95), rgba(255,255,255,.95));
      border-color: rgba(15,23,42,.10);
    }

    main{flex:1; display:grid; grid-template-columns: 1.05fr .95fr; gap:12px; min-height:0;}
    .panel{
      border:1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      overflow:hidden;
      min-height:0;
      display:flex;
      flex-direction:column;
    }
    .panel-head{
      padding:12px 14px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .panel-head .title{font-size:13px; font-weight:700;}
    .panel-head .hint{font-size:12px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

    /* Chat */
    .messages{
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:10px;
      overflow:auto;
      min-height:0;
      flex:1;
    }
    .msg{
      max-width:92%;
      padding:10px 12px;
      border-radius: 14px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.96);
      line-height: 1.55;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user{
      margin-left:auto;
      background: linear-gradient(135deg, rgba(173,205,234,.45), rgba(255,255,255,.98));
    }
    .msg.ai{
      margin-right:auto;
      background: rgba(255,255,255,.96);
      border-left: 3px solid rgba(173,205,234,.85);
    }
    .composer{
      padding:12px;
      border-top:1px solid var(--line);
      display:flex;
      gap:10px;
      align-items:flex-end;
    }
    textarea{
      width:100%;
      resize:none;
      border:1px solid var(--line);
      border-radius: 14px;
      padding:10px 12px;
      background: rgba(255,255,255,.92);
      outline:none;
      font-family: var(--sans);
      font-size:13px;
      line-height:1.5;
      max-height: 160px;
    }
    .composer .btn{height:40px; padding:0 14px; border-radius:14px;}

    /* Code backend */
    .code-wrap{min-height:0; display:flex; flex-direction:column;}
    .editor{
      flex:1;
      min-height:0;
      width:100%;
      border:none;
      outline:none;
      padding:12px 12px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.55;
      background: rgba(255,255,255,.92);
    }
    .code-actions{
      display:flex; gap:10px; align-items:center; justify-content:space-between;
      padding:10px 12px;
      border-top:1px solid var(--line);
      background: rgba(255,255,255,.86);
      flex-wrap:wrap;
    }
    .small{font-size:12px; color:var(--muted)}
    iframe{width:100%; height:260px; border:0; background:white; border-top:1px solid var(--line);}

    @media (max-width: 980px){
      main{grid-template-columns: 1fr;}
      .pill input{width: 170px}
      iframe{height: 240px;}
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <div class="dot" aria-hidden="true"></div>
        <div>
          <h1>墨墨 · Chat + Code 后台</h1>
          <small>AI 改“整个网页外壳” → 一键发布到 GitHub Pages</small>
        </div>
      </div>

      <div class="top-actions">
        <div class="pill" title="填你的 Cloudflare Worker 地址，例如：https://momo-ui-backend.yourname.workers.dev">
          <label for="backendUrl">后端</label>
          <input id="backendUrl" placeholder="https://xxx.workers.dev" autocomplete="off" />
        </div>
        <div class="pill" title="后端校验用的控制密码（由你在 Worker 里设置）">
          <label for="adminPass">密码</label>
          <input id="adminPass" placeholder="不写进代码，仅本机保存" autocomplete="off" />
        </div>
        <button class="btn" id="btnPull">拉取</button>
        <button class="btn primary" id="btnPublish">一键发布</button>
      </div>
    </header>

    <main>
      <!-- Chat Panel -->
      <section class="panel">
        <div class="panel-head">
          <div class="title">聊天框</div>
          <div class="hint" id="status">未配置后端</div>
        </div>

        <div class="messages" id="messages"></div>

        <div class="composer">
          <textarea id="input" rows="2" placeholder="直接说你要怎么改这个网页（包括外壳布局、按钮、交互、文案、配色等）。&#10;例：把 header 简化、聊天区更大、代码区加搜索，保持蓝白风格。"></textarea>
          <button class="btn primary" id="send">发送</button>
        </div>
      </section>

      <!-- Code Backend Panel -->
      <section class="panel code-wrap">
        <div class="panel-head">
          <div class="title">代码后台（index.html）</div>
          <div class="hint">AI 需返回一个 ```html 代码块（完整文件）</div>
        </div>

        <textarea class="editor" id="code" spellcheck="false"></textarea>

        <div class="code-actions">
          <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
            <button class="btn" id="btnSaveLocal">本机保存</button>
            <button class="btn" id="btnApply">应用预览</button>
            <button class="btn" id="btnReset">重载当前页面源码</button>
          </div>
          <div class="small" id="tip">提示：发布会把此处内容提交为仓库根目录 index.html</div>
        </div>

        <iframe id="preview" sandbox="allow-scripts allow-forms allow-modals allow-popups"></iframe>
      </section>
    </main>
  </div>

  <script>
    const $ = (s)=>document.querySelector(s);
    const els = {
      backendUrl: $("#backendUrl"),
      adminPass: $("#adminPass"),
      status: $("#status"),
      messages: $("#messages"),
      input: $("#input"),
      send: $("#send"),
      code: $("#code"),
      preview: $("#preview"),
      btnApply: $("#btnApply"),
      btnSaveLocal: $("#btnSaveLocal"),
      btnReset: $("#btnReset"),
      btnPublish: $("#btnPublish"),
      btnPull: $("#btnPull"),
    };

    const STORAGE_KEY = "momo_self_editor_v2";
    const CODE_KEY = "momo_index_html_v2";

    function addMessage(role, content){
      const div = document.createElement("div");
      div.className = "msg " + (role === "user" ? "user" : "ai");
      div.textContent = content;
      els.messages.appendChild(div);
      els.messages.scrollTop = els.messages.scrollHeight;
      const st = loadState();
      st.chat.push({ role, content, ts: Date.now() });
      saveState(st);
    }

    function loadState(){
      try{
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
          backendUrl: "",
          adminPass: "",
          chat: []
        };
      }catch(e){
        return { backendUrl:"", adminPass:"", chat:[] };
      }
    }
    function saveState(st){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(st));
    }

    function renderChat(){
      const st = loadState();
      els.messages.innerHTML = "";
      for(const m of st.chat){
        const div = document.createElement("div");
        div.className = "msg " + (m.role === "user" ? "user" : "ai");
        div.textContent = m.content;
        els.messages.appendChild(div);
      }
      els.messages.scrollTop = els.messages.scrollHeight;
    }

    function renderStatus(){
      const url = els.backendUrl.value.trim();
      els.status.textContent = url ? ("后端已配置：" + url) : "未配置后端（需 Cloudflare Worker）";
    }

    function applyPreview(){
      const html = els.code.value || "";
      els.preview.srcdoc = html;
      localStorage.setItem(CODE_KEY, html);
    }

    async function loadCurrentPageSource(){
      // 尽量从网络拉取当前 index.html（GitHub Pages）
      const res = await fetch("./index.html", { cache: "no-store" });
      const text = await res.text();
      els.code.value = text;
      applyPreview();
    }

    function extractHtmlBlock(text){
      const m = /```html\s*([\s\S]*?)```/g.exec(text);
      if(!m) return null;
      return m[1].replace(/^\n+|\n+$/g, "");
    }

    async function api(path, body){
      const base = els.backendUrl.value.trim().replace(/\/+$/,"");
      if(!base) throw new Error("未填写后端地址");
      const pass = els.adminPass.value;
      const res = await fetch(base + path, {
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "X-Admin-Pass": pass
        },
        body: JSON.stringify(body || {})
      });
      if(!res.ok){
        const t = await res.text().catch(()=> "");
        throw new Error("后端错误：" + res.status + " " + t);
      }
      return await res.json();
    }

    async function onSend(){
      const need = els.input.value.trim();
      if(!need) return;

      addMessage("user", need);
      els.input.value = "";

      els.send.disabled = true;
      els.send.textContent = "发送中…";

      try{
        const cur = els.code.value || "";
        const data = await api("/chat", { need, currentHtml: cur });
        const reply = data.content || "";
        addMessage("ai", reply);

        const next = extractHtmlBlock(reply);
        if(next){
          els.code.value = next;
          applyPreview();
        }else{
          addMessage("ai", "（没检测到 ```html 代码块：未自动写入代码后台。）");
        }
      }catch(e){
        addMessage("ai", "错误：" + (e?.message || String(e)));
      }finally{
        els.send.disabled = false;
        els.send.textContent = "发送";
      }
    }

    async function onPublish(){
      els.btnPublish.disabled = true;
      els.btnPublish.textContent = "发布中…";
      try{
        const html = els.code.value || "";
        if(!html.trim()) throw new Error("代码为空");
        const data = await api("/publish", {
          html,
          message: "Update index.html from in-browser editor"
        });
        addMessage("ai", "已发布到 GitHub：" + (data.commitUrl || "OK"));
      }catch(e){
        addMessage("ai", "发布失败：" + (e?.message || String(e)));
      }finally{
        els.btnPublish.disabled = false;
        els.btnPublish.textContent = "一键发布";
      }
    }

    async function onPull(){
      els.btnPull.disabled = true;
      els.btnPull.textContent = "拉取中…";
      try{
        const data = await api("/pull", {});
        if(!data.html) throw new Error("拉取结果为空");
        els.code.value = data.html;
        applyPreview();
        addMessage("ai", "已从 GitHub 拉取最新 index.html");
      }catch(e){
        addMessage("ai", "拉取失败：" + (e?.message || String(e)));
      }finally{
        els.btnPull.disabled = false;
        els.btnPull.textContent = "拉取";
      }
    }

    // events
    els.send.addEventListener("click", onSend);
    els.input.addEventListener("keydown", (e)=>{
      if((e.ctrlKey || e.metaKey) && e.key === "Enter") onSend();
    });
    els.btnApply.addEventListener("click", applyPreview);
    els.btnSaveLocal.addEventListener("click", ()=>{
      localStorage.setItem(CODE_KEY, els.code.value || "");
      addMessage("ai", "已本机保存（localStorage）。");
    });
    els.btnReset.addEventListener("click", loadCurrentPageSource);
    els.btnPublish.addEventListener("click", onPublish);
    els.btnPull.addEventListener("click", onPull);

    els.backendUrl.addEventListener("input", ()=>{
      const st = loadState();
      st.backendUrl = els.backendUrl.value;
      saveState(st);
      renderStatus();
    });
    els.adminPass.addEventListener("input", ()=>{
      const st = loadState();
      st.adminPass = els.adminPass.value;
      saveState(st);
    });

    // init
    (async function init(){
      const st = loadState();
      els.backendUrl.value = st.backendUrl || "";
      els.adminPass.value = st.adminPass || "";
      renderStatus();
      renderChat();

      const local = localStorage.getItem(CODE_KEY);
      if(local && local.trim()){
        els.code.value = local;
        applyPreview();
      }else{
        await loadCurrentPageSource();
      }
    })();
  </script>
</body>
</html>
