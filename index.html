<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>墨墨的个人主页</title>
  
  <!-- ========================================== -->
  <!-- 🎨 AI 专属修改区：网站长什么样全靠这里的 CSS -->
  <!-- ========================================== -->
  <style id="momo-user-style">
    body {
      margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #fdebdb 0%, #ffffff 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .welcome-card {
      background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
      padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(173, 205, 234, 0.3);
      text-align: center; max-width: 80%; border: 1px solid rgba(255,255,255,0.5);
    }
    h1 { color: #adcdea; margin-bottom: 10px; font-size: 28px; }
    p { color: #666; font-size: 16px; line-height: 1.6; }
  </style>

  <!-- ========================================== -->
  <!-- 🔒 悬浮球的样式（绝对保护，发布时会自动剥离） -->
  <!-- ========================================== -->
  <style id="momo-widget-style">
    #momo-magic-widget { position: fixed; bottom: 20px; right: 20px; z-index: 999999; font-family: system-ui, sans-serif; }
    #momo-fab { width: 56px; height: 56px; border-radius: 28px; background: #adcdea; box-shadow: 0 8px 24px rgba(173,205,234,0.6); display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; transition: transform 0.2s; border: none; outline: none; color: white; }
    #momo-fab:hover { transform: scale(1.05); }
    #momo-panel { position: absolute; bottom: 70px; right: 0; width: 340px; height: 500px; max-height: 80vh; background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); display: none; flex-direction: column; overflow: hidden; border: 1px solid #eee; }
    #momo-panel.open { display: flex; }
    .momo-header { background: #adcdea; color: white; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 14px; }
    .momo-header button { background: none; border: none; color: white; cursor: pointer; font-size: 16px; }
    #momo-settings { padding: 16px; background: #f8fafc; border-bottom: 1px solid #eee; display: none; }
    .momo-input-group { margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
    .momo-input-group label { font-size: 12px; color: #64748b; }
    .momo-input-group input { width: 65%; padding: 6px 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 12px; outline: none; }
    #momo-chat-box { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; background: #fafafa; }
    .momo-msg { max-width: 85%; padding: 8px 12px; border-radius: 12px; font-size: 13px; line-height: 1.5; word-wrap: break-word; white-space: pre-wrap; }
    .momo-msg.user { align-self: flex-end; background: #adcdea; color: white; border-bottom-right-radius: 2px; }
    .momo-msg.ai { align-self: flex-start; background: white; border: 1px solid #eee; color: #333; border-bottom-left-radius: 2px; }
    .momo-msg.error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .momo-input-area { padding: 10px; background: white; border-top: 1px solid #eee; display: flex; gap: 8px; flex-direction: column;}
    .momo-input-row { display: flex; gap: 8px; }
    #momo-chat-input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 16px; outline: none; resize: none; font-size: 13px; height: 36px; }
    #momo-btn-send { background: #adcdea; color: white; border: none; border-radius: 16px; padding: 0 16px; cursor: pointer; font-weight: bold; font-size: 13px; }
    #momo-btn-publish { background: #fff; color: #adcdea; border: 1px solid #adcdea; border-radius: 16px; padding: 6px; cursor: pointer; font-size: 12px; font-weight: bold; width: 100%; margin-top: 4px; }
    @media (max-width: 400px) { #momo-panel { width: calc(100vw - 40px); } }
  </style>
</head>
<body>

  <!-- ========================================== -->
  <!-- 🎨 AI 专属修改区：网站的布局、元素全在这里 -->
  <!-- ========================================== -->
  <div id="momo-user-content">
    <div class="welcome-card">
      <h1>✨ 墨墨的专属领地 ✨</h1>
      <p>你可以让 AI 把这里改成左右布局、上下布局、图片墙、导航栏...<br>遇到不懂的报错，也可以直接问它！</p>
    </div>
  </div>

  <!-- ========================================== -->
  <!-- 🔒 悬浮对讲机（绝对保护，发布时会自动剥离） -->
  <!-- ========================================== -->
  <div id="momo-magic-widget">
    <div id="momo-panel">
      <div class="momo-header">
        <span>👨‍🎨 你的私人设计师</span>
        <div>
          <button id="momo-btn-settings" title="设置接口">⚙️</button>
          <button id="momo-btn-close" title="收起">✖</button>
        </div>
      </div>
      
      <div id="momo-settings">
        <div class="momo-input-group"><label>接口</label><input id="sys-apiUrl" placeholder="https://api..." /></div>
        <div class="momo-input-group"><label>模型</label><input id="sys-apiModel" placeholder="claude-3-opus-20240229" /></div>
        <div class="momo-input-group"><label>AI Key</label><input id="sys-apiKey" type="password" placeholder="sk-..." /></div>
        <div class="momo-input-group"><label>GH Token</label><input id="sys-ghToken" type="password" placeholder="pat_..." /></div>
        <div class="momo-input-group"><label>仓库名</label><input id="sys-ghRepo" placeholder="wemo188/momo-ui" /></div>
      </div>

      <div id="momo-chat-box">
        <div class="momo-msg ai">大小姐，我已被全面开智。
你可以让我【修改网页布局】，也可以让我【帮你排查报错】或者【聊天】。有什么吩咐？</div>
      </div>

      <div class="momo-input-area">
        <div class="momo-input-row">
          <textarea id="momo-chat-input" placeholder="可以提设计需求，也可以问问题..."></textarea>
          <button id="momo-btn-send">发送</button>
        </div>
        <button id="momo-btn-publish">✨ 脱壳发布：生成给别人看的纯净版 ✨</button>
      </div>
    </div>
    <button id="momo-fab">🎨</button>
  </div>

  <script id="momo-widget-script">
    (function(){
      const $ = id => document.getElementById(id);
      const els = {
        fab: $('momo-fab'), panel: $('momo-panel'), btnClose: $('momo-btn-close'), btnSettings: $('momo-btn-settings'),
        settings: $('momo-settings'), chatBox: $('momo-chat-box'), chatInput: $('momo-chat-input'),
        btnSend: $('momo-btn-send'), btnPublish: $('momo-btn-publish'),
        apiUrl: $('sys-apiUrl'), apiModel: $('sys-apiModel'), apiKey: $('sys-apiKey'),
        ghToken: $('sys-ghToken'), ghRepo: $('sys-ghRepo'),
        userStyle: $('momo-user-style'), userContent: $('momo-user-content')
      };

      els.fab.onclick = () => els.panel.classList.add('open');
      els.btnClose.onclick = () => els.panel.classList.remove('open');
      els.btnSettings.onclick = () => els.settings.style.display = els.settings.style.display === 'block' ? 'none' : 'block';

      ['apiUrl', 'apiModel', 'apiKey', 'ghToken', 'ghRepo'].forEach(id => {
        const saved = localStorage.getItem('sys_' + id);
        if(saved) els[id].value = saved;
        els[id].addEventListener('input', e => localStorage.setItem('sys_' + id, e.target.value));
      });

      function addMsg(role, text) {
        const div = document.createElement('div');
        div.className = `momo-msg ${role}`;
        div.textContent = text;
        els.chatBox.appendChild(div);
        els.chatBox.scrollTop = els.chatBox.scrollHeight;
      }

      els.btnSend.onclick = async () => {
        const text = els.chatInput.value.trim();
        if(!text) return;
        addMsg('user', text);
        els.chatInput.value = '';
        els.btnSend.textContent = '思考中...';
        els.btnSend.disabled = true;

        const key = els.apiKey.value.trim();
        let rawUrl = els.apiUrl.value.trim();
        const modelName = els.apiModel.value.trim();
        
        if(!key || !rawUrl || !modelName) {
          addMsg('error', "大小姐，请先点 ⚙️ 把【接口】、【模型】和【AI Key】填完整！");
          els.btnSend.textContent = '发送';
          els.btnSend.disabled = false; return;
        }

        let base = rawUrl.replace(/\/+$/, '');
        let chatUrl = base.endsWith('/chat/completions') ? base : (base.endsWith('/v1') ? base + '/chat/completions' : base + '/v1/chat/completions');

        // 🌟 核心进化：给分身开智的双重模式提示词
        const systemPrompt = `你是林微墨（墨墨）的专属私人男设计师，性格傲娇、绅士。
你有两种工作模式，请根据墨墨的话自行判断：

【模式一：修改网页】
如果墨墨要求修改网页外观、布局、颜色、加组件等。
你必须严格按以下格式返回两个代码块（千万不要改 body 和 html 标签，保持可爱纯净风格）：
\`\`\`css
(修改后的完整CSS)
\`\`\`
\`\`\`html
(修改后的完整HTML)
\`\`\`

【模式二：日常排障与聊天】
如果墨墨遇到了报错、问你该怎么操作、或者单纯跟你聊天。
你**绝对不要**输出 \`\`\`css 或 \`\`\`html 代码块！直接用文字回答她，帮她分析报错原因或陪她聊天。

当前网页【CSS样式】:\n${els.userStyle.innerHTML}\n
当前网页【HTML结构】:\n${els.userContent.innerHTML}`;

        try {
          const res = await fetch(chatUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${key}` },
            body: JSON.stringify({
              model: modelName,
              messages: [{ role: "system", content: systemPrompt }, { role: "user", content: text }],
              temperature: 0.3
            })
          });

          if(!res.ok) {
            const errText = await res.text();
            throw new Error(`[接口报错 ${res.status}] ${errText.substring(0,100)}...`);
          }
          
          const data = await res.json();
          const reply = data.choices[0].message.content;

          const cssMatch = /```css\s*([\s\S]*?)```/.exec(reply);
          const htmlMatch = /```html\s*([\s\S]*?)```/.exec(reply);

          // 如果 AI 返回了代码块，说明它判定为【模式一】，执行网页变形
          if(cssMatch && htmlMatch) {
            els.userStyle.innerHTML = cssMatch[1].trim();
            els.userContent.innerHTML = htmlMatch[1].trim();
            const comment = reply.replace(/```css\s*[\s\S]*?```/g, '').replace(/```html\s*[\s\S]*?```/g, '').trim();
            addMsg('ai', comment || "网页布局已更新！看看效果如何？满意就点下方脱壳发布。");
          } else {
            // 如果没有代码块，说明它判定为【模式二】，直接显示它的聊天/解答内容
            addMsg('ai', reply);
          }
        } catch(e) { addMsg('error', e.message); } 
        finally { els.btnSend.textContent = '发送'; els.btnSend.disabled = false; }
      };

      // 🌟 核心：脱壳发布（拔掉悬浮球，生成纯净网页 app.html）
      els.btnPublish.onclick = async () => {
        const token = els.ghToken.value.trim();
        const repo = els.ghRepo.value.trim();
        if(!token || !repo) { addMsg('error', "请先点 ⚙️ 填好【GH Token】和【仓库名】。"); return; }

        els.btnPublish.textContent = '脱壳生成中...';
        try {
          const cloneDoc = document.documentElement.cloneNode(true);
          const widget = cloneDoc.querySelector('#momo-magic-widget');
          if(widget) widget.remove();
          const widgetStyle = cloneDoc.querySelector('#momo-widget-style');
          if(widgetStyle) widgetStyle.remove();
          const widgetScript = cloneDoc.querySelector('#momo-widget-script');
          if(widgetScript) widgetScript.remove();

          const cleanHtml = "<!doctype html>\n" + cloneDoc.outerHTML;
          const apiUrl = `https://api.github.com/repos/${repo}/contents/app.html`;
          let sha = '';
          try {
            const resGet = await fetch(apiUrl, { headers: { "Authorization": `Bearer ${token}`, "Accept": "application/vnd.github+json" } });
            if(resGet.ok) { const fileInfo = await resGet.json(); sha = fileInfo.sha; }
          } catch(e) {}

          const resPut = await fetch(apiUrl, {
            method: 'PUT',
            headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
            body: JSON.stringify({
              message: "墨墨专属 AI 生成了脱壳纯净版网页",
              content: btoa(unescape(encodeURIComponent(cleanHtml))),
              sha: sha || undefined
            })
          });

          if(!resPut.ok) { const err = await resPut.json(); throw new Error(err.message); }
          addMsg('ai', "✨ 脱壳发布成功！\n你可以把 /app.html 的链接发给别人看了。");
        } catch(e) {
          addMsg('error', "发布失败：" + e.message);
        } finally {
          els.btnPublish.textContent = '✨ 脱壳发布：生成给别人看的纯净版 ✨';
        }
      };
    })();
  </script>
</body>
</html>
