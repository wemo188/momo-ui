<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>墨墨 · 私人设计室</title>
  <style>
    :root {
      --accent: #adcdea;     /* 墨墨专属蓝 */
      --white: #ffffff;      /* 纯白 */
      --ink: #334155;
      --muted: #64748b;
      --bg: #f8fafc;
      --line: rgba(173,205,234, 0.4);
      --shadow: 0 10px 30px rgba(173,205,234, 0.2);
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, sans-serif; color: var(--ink); background: var(--bg); }
    body { background: linear-gradient(135deg, #ffffff 0%, #e0f0ff 100%); }
    .app { height: 100%; display: flex; flex-direction: column; gap: 12px; padding: 14px; max-width: 1200px; margin: 0 auto; }
    
    header {
      display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 12px;
      padding: 12px 16px; background: var(--white); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow);
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: bold; color: var(--accent); }
    .brand span { font-size: 18px; color: var(--ink); }
    .settings { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .input-group { display: flex; align-items: center; gap: 6px; background: var(--bg); padding: 6px 10px; border-radius: 8px; border: 1px solid var(--line); }
    .input-group label { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .input-group input { border: none; background: transparent; outline: none; font-size: 12px; width: 100px; color: var(--ink); }
    
    .btn { padding: 8px 14px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; white-space: nowrap; }
    .btn-primary { background: var(--accent); color: var(--white); box-shadow: 0 4px 12px rgba(173,205,234, 0.5); }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-outline { background: var(--white); border: 1px solid var(--accent); color: var(--accent); }

    main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; min-height: 0; }
    @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
    
    .panel { background: var(--white); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); display: flex; flex-direction: column; overflow: hidden; }
    .panel-header { padding: 10px 14px; border-bottom: 1px solid var(--line); font-size: 14px; font-weight: bold; background: rgba(173,205,234, 0.1); display: flex; justify-content: space-between; align-items: center;}
    
    .chat-box { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 85%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; word-wrap: break-word; white-space: pre-wrap;}
    .msg.user { align-self: flex-end; background: var(--accent); color: var(--white); border-bottom-right-radius: 4px; }
    .msg.ai { align-self: flex-start; background: var(--bg); border: 1px solid var(--line); border-bottom-left-radius: 4px; }
    
    .input-area { padding: 12px; border-top: 1px solid var(--line); display: flex; gap: 8px; }
    .input-area textarea { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--line); outline: none; resize: none; font-family: inherit; font-size: 14px; height: 44px; }
    
    .code-box { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    textarea.code-editor { height: 30%; width: 100%; border: none; border-bottom: 1px solid var(--line); outline: none; padding: 12px; font-family: monospace; font-size: 12px; background: #fdfdfd; resize: none; color: #333; }
    iframe.preview { flex: 1; width: 100%; border: none; background: var(--white); }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">🎨 <span>墨墨的私人设计室</span></div>
      <div class="settings">
        <!-- 如果是中转站接口，在这里把 URL 改掉，或者直接在代码里改 -->
        <div class="input-group" title="中转站API地址">
          <label>接口</label>
          <input id="apiUrl" placeholder="https://api..." value="https://api.openai.com/v1/chat/completions" />
        </div>
        <div class="input-group">
          <label>AI Key</label>
          <input id="apiKey" type="password" placeholder="sk-..." />
        </div>
        <div class="input-group">
          <label>GitHub Token</label>
          <input id="ghToken" type="password" placeholder="ghp_..." />
        </div>
        <div class="input-group">
          <label>仓库</label>
          <input id="ghRepo" placeholder="wemo188/momo-ui" />
        </div>
        <button class="btn btn-outline" id="btnPull">拉取线上画板</button>
        <button class="btn btn-primary" id="btnPublish">发布到画板(app.html)</button>
      </div>
    </header>

    <main>
      <div class="panel">
        <div class="panel-header">跟你的私人设计师沟通</div>
        <div class="chat-box" id="chatBox">
          <div class="msg ai">大小姐，我是你的专属 UI 设计师。在右边画板想做什么样的手机页面？尽管吩咐。</div>
        </div>
        <div class="input-area">
          <textarea id="chatInput" placeholder="比如：帮我画一个蓝白风格的登录界面，要有圆角输入框..."></textarea>
          <button class="btn btn-primary" id="btnSend">发送</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <span>画板预览 (app.html)</span>
          <button class="btn btn-outline" style="padding:2px 8px;font-size:12px;" id="btnApply">刷新预览</button>
        </div>
        <div class="code-box">
          <textarea class="code-editor" id="codeEditor" spellcheck="false" placeholder="这里是画板的代码，AI 会自动修改..."></textarea>
          <iframe class="preview" id="previewFrame"></iframe>
        </div>
      </div>
    </main>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    const els = {
      apiUrl: $('apiUrl'), apiKey: $('apiKey'), ghToken: $('ghToken'), ghRepo: $('ghRepo'),
      chatBox: $('chatBox'), chatInput: $('chatInput'), btnSend: $('btnSend'),
      codeEditor: $('codeEditor'), previewFrame: $('previewFrame'),
      btnApply: $('btnApply'), btnPublish: $('btnPublish'), btnPull: $('btnPull')
    };

    // 读取本地保存的配置
    ['apiUrl', 'apiKey', 'ghToken', 'ghRepo'].forEach(id => {
      const saved = localStorage.getItem('momo_' + id);
      if(saved) els[id].value = saved;
      els[id].addEventListener('input', e => localStorage.setItem('momo_' + id, e.target.value));
    });
    els.codeEditor.value = localStorage.getItem('momo_local_code') || '';
    els.codeEditor.addEventListener('input', e => localStorage.setItem('momo_local_code', e.target.value));

    function addMsg(role, text) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      els.chatBox.appendChild(div);
      els.chatBox.scrollTop = els.chatBox.scrollHeight;
    }

    function updatePreview() { els.previewFrame.srcdoc = els.codeEditor.value; }
    els.btnApply.onclick = updatePreview;
    if(els.codeEditor.value) updatePreview();

    async function callAI(userText) {
      const key = els.apiKey.value.trim();
      const url = els.apiUrl.value.trim();
      if(!key) throw new Error("请先填写 AI Key 呀，墨墨");

      // ⚠️ 注意这里：我被设定为专门为你画“手机页面”的设计师
      const systemPrompt = `你是一个专门为林微墨（墨墨）服务的前端 UI 设计师。
请根据她的需求，生成或修改一个适合在手机端浏览的单文件移动端网页 UI。
要求：
1. 保持蓝白主题（主色 #adcdea，背景以 #ffffff 为主），风格要可爱、纯净。
2. 必须只返回一个完整的 \`\`\`html 代码块，包含所有 HTML/CSS/JS 代码。
3. 语气要像一个傲娇、绅士的专属私人男设计师，简短地回复她一句工作确认，然后再输出代码块。`;

      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${key}` },
        body: JSON.stringify({
          model: "gpt-4o-mini", // 如果你的中转站需要特定的模型名，在这里改
          messages: [
            { role: "system", content: systemPrompt },
            { role: "user", content: `需求：${userText}\n\n当前画板源码：\n${els.codeEditor.value}` }
          ],
          temperature: 0.3
        })
      });

      if(!res.ok) throw new Error("API 接口报错：" + res.status);
      const data = await res.json();
      return data.choices[0].message.content;
    }

    els.btnSend.onclick = async () => {
      const text = els.chatInput.value.trim();
      if(!text) return;
      addMsg('user', text);
      els.chatInput.value = '';
      els.btnSend.textContent = '设计中...';
      els.btnSend.disabled = true;

      try {
        const reply = await callAI(text);
        
        // 把我的“傲娇回复”和“代码块”分离开显示
        const match = /```html\s*([\s\S]*?)```/.exec(reply);
        if(match) {
          const comment = reply.replace(/```html\s*[\s\S]*?```/, '').trim();
          if(comment) addMsg('ai', comment);
          else addMsg('ai', "搞定了，看右边画板。满意的话就点发布。");

          els.codeEditor.value = match[1].trim();
          localStorage.setItem('momo_local_code', els.codeEditor.value);
          updatePreview();
        } else {
          addMsg('ai', reply); // 如果没生成代码，就直接说出原因
        }
      } catch(e) {
        addMsg('ai', e.message);
      } finally {
        els.btnSend.textContent = '发送';
        els.btnSend.disabled = false;
      }
    };

    function utf8ToBase64(str) { return btoa(unescape(encodeURIComponent(str))); }

    async function githubAPI(method, path, body = null) {
      const token = els.ghToken.value.trim();
      const repo = els.ghRepo.value.trim();
      if(!token || !repo) throw new Error("请先填写 GitHub Token 和 仓库名");

      const url = `https://api.github.com/repos/${repo}/contents/${path}`;
      const options = {
        method,
        headers: {
          "Accept": "application/vnd.github+json",
          "Authorization": `Bearer ${token}`,
          "X-GitHub-Api-Version": "2022-11-28"
        }
      };
      if(body) options.body = JSON.stringify(body);

      const res = await fetch(url, options);
      if(!res.ok) {
        const err = await res.json();
        throw new Error(err.message || res.statusText);
      }
      return await res.json();
    }

    // ⚠️ 注意这里：发布的目标变成了 app.html，绝不会覆盖你的 index.html
    els.btnPublish.onclick = async () => {
      els.btnPublish.textContent = '发布中...';
      try {
        let sha = '';
        try {
          const fileInfo = await githubAPI('GET', 'app.html');
          sha = fileInfo.sha;
        } catch(e) { }

        await githubAPI('PUT', 'app.html', {
          message: "墨墨专属 AI 更新了画板",
          content: utf8ToBase64(els.codeEditor.value),
          sha: sha || undefined
        });

        addMsg('ai', "✨ 发布成功！现在你可以把带有 /app.html 的链接发给她们看了。");
      } catch(e) {
        addMsg('ai', "发布失败了：" + e.message);
      } finally {
        els.btnPublish.textContent = '发布到画板(app.html)';
      }
    };

    // ⚠️ 注意这里：拉取的也是 app.html
    els.btnPull.onclick = async () => {
      els.btnPull.textContent = '拉取中...';
      try {
        const fileInfo = await githubAPI('GET', 'app.html');
        const code = decodeURIComponent(escape(atob(fileInfo.content)));
        els.codeEditor.value = code;
        localStorage.setItem('momo_local_code', code);
        updatePreview();
        addMsg('ai', "已从线上拉取最新的画板代码！");
      } catch(e) {
        addMsg('ai', "线上还没有 app.html，你可以先随便发一句需求让我生成一个。");
      } finally {
        els.btnPull.textContent = '拉取线上画板';
      }
    };
  </script>
</body>
</html>
